title: Gabriel Urbain
tagline: Consultant in Robotics &amp; AI
description: >-
  PhD in AI and Robotics, founder of RBAI, 5+ years of startup engineering.
  Notes on research, projects, and integration work in robotics, machine
  learning and industrial computer vision.
author: Gabriel Urbain
email: gabriel@rbai.be
url: "https://gurbain.github.io"
baseurl: ""

# Collection for articles
collections:
  articles:
    output: true
    permalink: /:collection/:name/

defaults:
  - scope:
      path: ""
      type: "articles"
    values:
      layout: "article"

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Keep GH verification file and CNAME as passthrough
keep_files:
  - img
  - googledeebfd6a31da9219.html

# Files not served by the site
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md
  - LICENSE
  - .bundle
